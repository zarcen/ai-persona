name: Build & Validate Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build all plugins
        run: ./scripts/build.sh

      - name: Validate all plugins
        run: ./scripts/validate.sh

      - name: Lint skills (skill-validator)
        continue-on-error: true
        run: |
          go install github.com/agent-ecosystem/skill-validator/cmd/skill-validator@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          for skill_dir in plugins/*/skills/*/; do
            [ -d "$skill_dir" ] || continue
            echo "▶ Validating $skill_dir"
            skill-validator validate structure "$skill_dir" --emit-annotations
            skill-validator validate links "$skill_dir" --emit-annotations
          done

      - name: Commit built artifacts (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json .cursor-plugin/marketplace.json
          git diff --cached --quiet || git commit -m "chore: rebuild marketplace catalogs [skip ci]"
          git push
